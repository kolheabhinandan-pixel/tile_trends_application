name: Daily Tile Trends Pipeline

on:
  schedule:
    - cron: '30 3 * * *'   # Runs daily at 9:00 AM IST
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Bootstrap
        run: |
          python bootstrap.py

      - name: Run Daily Pipeline
        run: |
          python daily_pipeline.py

      - name: Run Scheduler
        run: |
          python scheduler.py --now

      - name: Commit Changes
        run: |
          git config --global user.name "kolheabhinandan-pixel"
          git config --global user.email "kolhe.abhinandan@hrjohnsonindia.com"
          git add .
          git commit -m "Daily automated update" || echo "No changes"
          git push
